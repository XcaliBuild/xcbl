<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>IPTV</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .btn { display: block; padding: 15px; border-bottom: 1px solid #333; cursor: pointer; background: #111; margin-bottom: 5px; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="app">Chargement en cours...</div>
    <script>
        // On passe par un proxy pour contourner le blocage CORS
        const targetUrl = "http://s.rocketdns.info:8080/get.php?username=39619456&password=57108545&type=m3u_plus&output=ts";
        const proxy = "https://corsproxy.io/?";

        fetch(proxy + encodeURIComponent(targetUrl))
            .then(r => r.text())
            .then(data => {
                const lines = data.split('\n');
                const app = document.getElementById('app');
                app.innerHTML = "";
                lines.forEach((line, i) => {
                    if (line.includes("#EXTINF")) {
                        const name = line.split(',')[1];
                        const stream = lines[i+1];
                        const div = document.createElement('div');
                        div.className = 'btn';
                        div.innerText = name;
                        div.onclick = () => window.location.href = 'player.html?url=' + encodeURIComponent(stream);
                        app.appendChild(div);
                    }
                });
            })
            .catch(err => {
                document.getElementById('app').innerText = "Erreur : " + err;
            });
    </script>
</body>
</html>
