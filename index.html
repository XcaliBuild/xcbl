<script>
    async function initPlayer() {
        const params = new URLSearchParams(window.location.search);
        let streamUrl = params.get('url');

        // Si c'est un lien jmp2.uk, on va chercher l'adresse réelle avant de lancer le player
        if (streamUrl.includes('jmp2.uk')) {
            const response = await fetch(streamUrl, { redirect: 'follow' });
            streamUrl = response.url;
        }

        const video = document.getElementById('player');
        if (Hls.isSupported()) {
            const hls = new Hls({ maxBufferLength: 15, enableWorker: true });
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = streamUrl;
            video.addEventListener('loadedmetadata', () => video.play());
        }
    }
    initPlayer();
</script>
