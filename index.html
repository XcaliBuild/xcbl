<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>
    <video id="player" controls autoplay playsinline muted></video>
    <script>
        const video = document.getElementById('player');
        const params = new URLSearchParams(window.location.search);
        const streamUrl = params.get('url');

        if (streamUrl) {
            if (Hls.isSupported()) {
                const hls = new Hls({ maxBufferLength: 15, enableWorker: true });
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else {
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', () => video.play());
            }
        }
        // Déblocage du son au clic
        window.addEventListener('click', () => { video.muted = false; video.play(); }, { once: true });
        window.addEventListener('touchstart', () => { video.muted = false; video.play(); }, { once: true });
    </script>
</body>
</html>
