<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ouverture lecteur...</title>
</head>
<body>
    <script>
        const params = new URLSearchParams(window.location.search);
        const url = params.get('url');

        if (url) {
            // Cette commande force Android à ouvrir le lien dans le lecteur natif (VLC, MX Player, etc.)
            window.location.href = "intent://" + url.replace("https://", "").replace("http://", "") + "#Intent;scheme=http;package=org.videolan.vlc;end";
            
            // Si VLC n'est pas installé, on tente une ouverture standard
            setTimeout(() => {
                window.location.href = url;
            }, 1000);
        }
    </script>
</body>
</html>
