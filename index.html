<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Player Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>
    <video id="player" controls autoplay playsinline muted></video>
    
    <script>
        async function loadStream() {
            const video = document.getElementById('player');
            const params = new URLSearchParams(window.location.search);
            let streamUrl = params.get('url');

            if (!streamUrl) return;

            // Si c'est un lien raccourci (jmp2.uk ou autre), on suit la redirection
            if (streamUrl.includes('jmp2.uk')) {
                try {
                    const response = await fetch(streamUrl, { method: 'GET', mode: 'cors' });
                    streamUrl = response.url;
                } catch (e) {
                    console.error("Erreur de redirection :", e);
                }
            }

            if (Hls.isSupported()) {
                const hls = new Hls({ maxBufferLength: 15, enableWorker: true });
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else {
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', () => video.play());
            }
        }

        // Déblocage du son
        window.addEventListener('click', () => { document.getElementById('player').muted = false; }, { once: true });
        window.addEventListener('touchstart', () => { document.getElementById('player').muted = false; }, { once: true });

        loadStream();
    </script>
</body>
</html>
