<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>MBC TV Player</title>
    <style>
        body { background: #111; color: #fff; margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #player-container { width: 100%; height: 60vh; background: #000; }
        #menu { padding: 20px; overflow-y: auto; height: 35vh; }
        .video-item { padding: 10px; cursor: pointer; border: 2px solid transparent; }
        .selected { border-color: #ff0000; background: #222; }
    </style>
</head>
<body>

    <div id="player-container"><div id="player"></div></div>
    <div id="menu"><h3>Dernières vidéos MBC</h3><div id="list"></div></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const CHANNEL_ID = "UCx5T0Y2T0pB53F4X_uQ521w";
        let player, videos = [];
        let selectedIndex = 0;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%', width: '100%',
                playerVars: { 'autoplay': 1, 'controls': 0, 'rel': 0, 'modestbranding': 1 }
            });
            fetchVideos();
        }

        async function fetchVideos() {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}`);
            const data = await res.json();
            videos = data.items;
            renderList();
        }

        function renderList() {
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = videos.map((v, i) => 
                `<div class="video-item ${i === selectedIndex ? 'selected' : ''}" id="v-${i}">${v.title}</div>`
            ).join('');
            player.loadVideoById(videos[selectedIndex].videoId);
        }

        window.addEventListener("keydown", (e) => {
            if (e.key === "ArrowDown" && selectedIndex < videos.length - 1) selectedIndex++;
            if (e.key === "ArrowUp" && selectedIndex > 0) selectedIndex--;
            if (e.key === "Enter") {
                player.loadVideoById(videos[selectedIndex].videoId);
                player.playVideo();
            }
            
            // Mise à jour visuelle de la sélection
            document.querySelectorAll('.video-item').forEach(el => el.classList.remove('selected'));
            document.getElementById(`v-${selectedIndex}`).classList.add('selected');
            document.getElementById(`v-${selectedIndex}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
        });
    </script>
</body>
</html>
