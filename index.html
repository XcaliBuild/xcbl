<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma TV</title>
    <style>
        body { background: #121212; color: #ffffff; font-family: sans-serif; padding: 20px; }
        .chaine { 
            display: block; 
            padding: 20px; 
            margin: 10px 0; 
            background: #2c2c2c; 
            border: 2px solid transparent; 
            border-radius: 8px; 
            cursor: pointer; 
            text-decoration: none; 
            color: white;
            font-size: 1.2rem;
        }
        /* Style spécial pour la sélection à la télécommande */
        .chaine:focus { 
            border-color: #ff9900; 
            background: #444; 
            outline: none;
        }
    </style>
</head>
<body>
    <div id="liste"></div>

    <script>
        // Remplace par tes vrais liens
        const channels = [
            { name: "Chaîne XD 1", url: "http://s.rocketdns.info:8080/live/Z3nXfkOnf0/Madt8rUvmN/659439.m3u8" },
            { name: "Chaîne 2", url: "LIEN_M3U8_2" }
        ];

        const container = document.getElementById('liste');
        channels.forEach(ch => {
            const a = document.createElement('a');
            a.className = "chaine";
            a.innerText = ch.name;
            a.href = ch.url; // Le clic ouvre directement le lecteur natif
            a.tabIndex = "0"; // Rend l'élément sélectionnable par télécommande
            container.appendChild(a);
        });
    </script>
</body>
</html>
