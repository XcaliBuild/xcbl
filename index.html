<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>MBC Player</title>
    <style>
        body { background: #000; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #player { width: 800px; height: 450px; }
    </style>
</head>
<body>

    <div id="player"></div>

    <script>
        // Charger l'API IFrame de manière asynchrone
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: 'fJ56-17b88U', // Remplacez par l'ID d'une vidéo spécifique de la MBC
                playerVars: { 
                    'autoplay': 1, 
                    'rel': 0,
                    'modestbranding': 1
                },
                events: {
                    'onError': onPlayerError
                }
            });
        }

        function onPlayerError(event) {
            console.error("Erreur YouTube code: " + event.data);
            alert("Erreur de lecture : YouTube bloque l'intégration sur ce domaine.");
        }
    </script>
</body>
</html>
