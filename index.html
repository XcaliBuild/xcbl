<!DOCTYPE html>
<html lang="fr">
<head>
    <style>
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 20px; }
        .card { background: #222; padding: 15px; text-align: center; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="grid" id="menu"></div>

    <script>
        fetch('liste.json')
            .then(res => res.json())
            .then(data => {
                const menu = document.getElementById('menu');
                data.channels.forEach(ch => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `<h3>${ch.name}</h3>`;
                    div.onclick = () => window.location.href = `player.html?url=${encodeURIComponent(ch.url)}`;
                    menu.appendChild(div);
                });
            });
    </script>
</body>
</html>
