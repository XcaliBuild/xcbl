<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Lecteur</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; flex-direction: column; }
        video { flex-grow: 1; width: 100%; }
        .nav { padding: 10px; background: #000; color: white; text-decoration: none; }
    </style>
</head>
<body>
    <a href="index.html" class="nav">← Retour</a>
    <video id="video" controls autoplay playsinline></video>

    <script>
        const video = document.getElementById('video');
        const player = new shaka.Player(video);
        const url = new URLSearchParams(window.location.search).get('url');

        player.load(url).catch(e => console.error("Erreur:", e));
    </script>
</body>
</html>
