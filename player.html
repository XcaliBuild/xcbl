<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Lecteur</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        video { width: 100vw; height: 100vh; }
        .back { position: absolute; top: 10px; left: 10px; color: white; z-index: 10; padding: 10px; background: rgba(0,0,0,0.5); text-decoration: none; }
    </style>
</head>
<body>
    <a href="index.html" class="back">← Retour</a>
    <video id="v" controls autoplay playsinline></video>
    <script>
        const v = document.getElementById('v');
        const p = new shaka.Player(v);
        const url = new URLSearchParams(window.location.search).get('url');
        p.load("https://corsproxy.io/?" + encodeURIComponent(url)).catch(() => {
            v.src = url;
        });
    </script>
</body>
</html>
